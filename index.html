<title>OS Projects</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:#1a1a1a;padding:1.5rem;overflow-x:auto}
.app{max-width:960px;margin:0 auto}
.topbar{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.topbar h1{font-size:16px;font-weight:500;flex:1}
.phase-tabs{display:flex;gap:5px}
.tab{font-size:12px;padding:4px 11px;border-radius:6px;border:0.5px solid #ccc;background:transparent;color:#666;cursor:pointer}
.tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.tab:hover:not(.active){background:#f5f5f5}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:1.25rem}
.metric{background:#f5f5f5;border-radius:6px;padding:0.65rem 0.9rem}
.metric .ml{font-size:11px;color:#888;margin-bottom:2px}
.metric .mv{font-size:18px;font-weight:500;color:#1a1a1a}
table{width:100%;border-collapse:collapse;table-layout:auto}
.col-topic{width:200px;min-width:200px;max-width:200px}
.col-subject{width:200px}
.col-tasks{width:auto}
thead th{font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.04em;padding:4px 8px 6px;border-bottom:0.5px solid #ddd;text-align:left}
.topic-cell{padding:6px 8px 4px;font-size:13px;font-weight:500;color:#1a1a1a;vertical-align:top}
.topic-label{display:flex;align-items:flex-start;gap:6px}
.topic-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}
.topic-name{word-break:break-word;white-space:normal;line-height:1.35}
.subj-row td{padding:2px 0}
.subj-row:last-child td{padding-bottom:8px}
.subj-cell{padding:3px 8px;font-size:12px;color:#666;vertical-align:middle;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tasks-cell{padding:3px 0;vertical-align:middle;overflow:visible;border-left:1px solid #ccc}
.tasks-inline{display:flex;align-items:center;gap:0;flex-wrap:nowrap;overflow:visible}
.task-chip{display:flex;align-items:center;gap:5px;padding:3px 10px;border-radius:0;border:none;border-right:1px solid #ccc;background:#fff;cursor:pointer;flex-shrink:0;width:200px;transition:background .1s}
.task-chip:hover{background:#f5f5f5}
.task-chip.done{background:#f5f5f5;border-color:transparent}
.chip-check{width:13px;height:13px;border-radius:50%;border:1.5px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.task-chip.done .chip-check{background:#1D9E75;border-color:#1D9E75}
.task-chip.done .chip-check::after{content:'';display:block;width:3px;height:5px;border:1.5px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px)}
.chip-label{font-size:12px!important;color:#1a1a1a;white-space:normal;word-break:break-word;line-height:1.3}
.task-chip.done .chip-label{text-decoration:line-through;color:#999}
.task-chip.urgent .chip-label{color:#1a1a1a;font-weight:500}
.task-chip.urgent{border-color:#aaa}
.task-chip.future .chip-label{color:#E8846A}
.task-chip.future{border-color:#F5C4B3}
.task-chip.nextphase .chip-label{color:#7F77DD}
.task-chip.nextphase{border-color:#C5C2F0}
.overflow-badge{flex-shrink:0;font-size:12px;padding:3px 8px;border-radius:6px;background:#f5f5f5;color:#666;cursor:pointer;border:0.5px solid #e0e0e0;white-space:nowrap}
.overflow-badge:hover{background:#e8e8e8}
.goal-pill{font-size:10px;padding:2px 7px;border-radius:6px;background:#E6F1FB;color:#0C447C;white-space:nowrap;display:inline-block;margin-left:4px}
.add-chip{flex-shrink:0;display:flex;align-items:center;padding:3px 8px;border-radius:6px;border:0.5px dashed #ccc;font-size:12px;color:#999;cursor:pointer;white-space:nowrap}
.add-chip:hover{background:#f5f5f5;color:#1a1a1a}
.sep-row td{height:3px;background:#1a1a1a;padding:0}
.add-topic-row{display:flex;gap:8px;margin-top:10px;align-items:center}
.add-topic-row input{font-size:12px;padding:5px 9px;border-radius:6px;border:0.5px solid #ccc;background:#fff;color:#1a1a1a}
.add-topic-row input::placeholder{color:#aaa}
.add-topic-row button{font-size:12px;padding:5px 12px;border-radius:6px;border:0.5px solid #ccc;background:transparent;color:#1a1a1a;cursor:pointer}
.add-topic-row button:hover{background:#f5f5f5}
.popover{position:absolute;z-index:10;background:#fff;border:0.5px solid #ccc;border-radius:10px;padding:8px;display:flex;flex-direction:column;gap:4px;min-width:200px;max-width:280px;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.popover-task{display:flex;align-items:center;gap:7px;padding:4px 6px;border-radius:6px;cursor:pointer}
.popover-task:hover{background:#f5f5f5}
.popover-add{display:flex;gap:6px;margin-top:4px;padding-top:6px;border-top:0.5px solid #eee}
.popover-add input{flex:1;font-size:12px;padding:4px 7px;border-radius:6px;border:0.5px solid #ccc;background:#fff;color:#1a1a1a}
.popover-add input::placeholder{color:#aaa}
.popover-add button{font-size:11px;padding:4px 8px;border-radius:6px;border:0.5px solid #ccc;background:transparent;color:#1a1a1a;cursor:pointer}
.popover-add button:hover{background:#f5f5f5}
.save-indicator{font-size:11px;color:#aaa;margin-left:8px;transition:opacity .3s}
.export-btn{font-size:12px;padding:4px 12px;border-radius:6px;border:0.5px solid #ccc;background:transparent;color:#666;cursor:pointer;margin-left:4px}
.export-btn:hover{background:#f5f5f5;color:#1a1a1a}
.export-toast{font-size:11px;color:#1D9E75;margin-left:6px;transition:opacity .3s}

@media(max-width:768px){
  body{padding:0.75rem}
  .app{max-width:100%}
  .topbar{gap:6px}
  .topbar h1{font-size:15px}
  .export-btn{font-size:11px;padding:3px 8px}
  .phase-tabs{flex-wrap:wrap;gap:4px}
  .tab{font-size:11px;padding:3px 9px}
  .metrics{grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}
  .metric{padding:0.5rem 0.7rem}
  .metric .ml{font-size:10px}
  .metric .mv{font-size:16px}
  thead th{font-size:10px;padding:3px 6px 5px}
  .col-topic{width:100px;min-width:100px;max-width:100px}
  .col-subject{width:100px;min-width:100px}
  .topic-cell{padding:4px 6px 2px;font-size:12px}
  .topic-name{font-size:12px}
  .subj-cell{padding:2px 6px;font-size:11px}
  .task-chip{width:140px;padding:4px 6px}
  .chip-label{font-size:11px}
  .add-chip{font-size:11px;padding:3px 6px;width:80px}
  .overflow-badge{font-size:10px;padding:2px 6px}
  .add-topic-row{flex-wrap:wrap;gap:6px}
  .add-topic-row input{font-size:11px;padding:4px 7px;flex:1;min-width:100px}
  .add-topic-row button{font-size:11px;padding:4px 9px}
  .save-indicator{font-size:10px}
  .popover{min-width:160px;max-width:90vw;left:5vw!important}
  .popover-task span{font-size:11px}
  .popover-add input{font-size:11px}
  .popover-add button{font-size:10px;padding:3px 7px}
  .goal-pill{font-size:9px;padding:1px 5px}
  .sep-row td{height:2px}
}
@media(max-width:480px){
  .topbar{flex-direction:column;align-items:flex-start}
  .topbar h1{margin-bottom:4px}
  .col-topic{width:80px;min-width:80px;max-width:80px}
  .col-subject{width:90px;min-width:90px}
  .task-chip{width:120px}
  .metrics{grid-template-columns:repeat(2,minmax(0,1fr))}
}

.popover-actions{display:flex;gap:4px;margin-left:auto;flex-shrink:0;opacity:0;transition:opacity .15s}
.popover-task:hover .popover-actions{opacity:1}
.act-btn{font-size:10px;padding:2px 6px;border-radius:4px;border:0.5px solid #ddd;background:transparent;cursor:pointer;color:#666}
.act-btn:hover{background:#f0f0f0}
.act-btn.del{color:#c0392b;border-color:#f5c6c6}
.act-btn.del:hover{background:#fdf0f0}
.inline-edit{flex:1;font-size:12px;padding:2px 6px;border-radius:4px;border:0.5px solid #ccc;background:#fff;color:#1a1a1a;outline:none}
.topic-edit-row{display:flex;gap:6px;padding:4px 8px;border-top:0.5px solid #eee;margin-top:4px}
.topic-edit-row input{flex:1;font-size:12px;padding:3px 7px;border-radius:4px;border:0.5px solid #ccc;background:#fff;color:#1a1a1a}
.topic-edit-row button{font-size:11px;padding:3px 8px;border-radius:4px;border:0.5px solid #ccc;background:transparent;color:#1a1a1a;cursor:pointer}
.topic-edit-row button:hover{background:#f5f5f5}
.topic-edit-row button.del{color:#c0392b;border-color:#f5c6c6}
.topic-edit-row button.del:hover{background:#fdf0f0}

.topic-cell{cursor:grab}
.topic-cell:active{cursor:grabbing}
.topic-cell.dragging{opacity:0.4}
.drag-over-top td{border-top:2px solid #378ADD!important}
.drag-over-bottom td{border-bottom:2px solid #378ADD!important}
.drag-handle{display:inline-block;margin-right:6px;color:#ccc;font-size:13px;cursor:grab;user-select:none}
.task-drag-handle{display:inline-block;color:#ccc;font-size:9px;cursor:grab;user-select:none;margin-right:3px;flex-shrink:0;line-height:1}
.task-chip.task-dragging{opacity:0.4}
.task-chip.task-drop-before{box-shadow:inset 3px 0 0 #378ADD}
.task-chip.task-drop-after{box-shadow:inset -3px 0 0 #378ADD}

.subj-concluded{text-decoration:line-through;color:#bbb}
.subj-check-badge{width:13px;height:13px;border-radius:50%;background:#1D9E75;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;vertical-align:middle;margin-right:4px}
.subj-check-badge::after{content:'';display:block;width:3px;height:5px;border:1.5px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px)}
.act-btn.conclude{color:#1D9E75;border-color:#a8dcc8}
.act-btn.reopen{color:#bbb;border-color:#ddd}

/* ── Phase rail ───────────────────────────────────────────────────────────── */
.phase-rail{display:flex;gap:6px;margin-bottom:1.25rem;overflow-x:auto;max-width:60%}
.rail-item{flex:none;min-width:50px;padding:6px 7px;border:0.5px solid #ddd;border-radius:4px;background:#fff;cursor:pointer;transition:background .1s}
.rail-item:hover:not(.active){background:#f5f5f5}
.rail-item.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.rail-name{font-size:11px;font-weight:500;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rail-dates{display:flex;align-items:center;gap:3px}
.rail-date-inp{font-size:9px;border:none;border-bottom:0.5px solid transparent;background:transparent;padding:0;cursor:pointer;width:72px;outline:none;color:#bbb}
.rail-date-inp:hover,.rail-date-inp:focus{border-bottom-color:#ccc;color:#1a1a1a}
.rail-item.active .rail-date-inp{color:#666;color-scheme:dark}
.rail-item.active .rail-date-inp:hover,.rail-item.active .rail-date-inp:focus{color:#ddd;border-bottom-color:#555}
.rail-sep{font-size:10px;color:#ccc;flex-shrink:0}
.rail-item.active .rail-sep{color:#555}
@media(max-width:768px){
  .rail-item{min-width:40px;padding:1px 3px}
  .rail-name{font-size:10px}
  .rail-date-inp{font-size:8px;width:56px}
}
</style>

<div class="app">

    <span class="save-indicator" id="save-indicator"></span>

    <button class="export-btn" onclick="document.getElementById('restore-input').click()">&#8679; Restore</button>
    <input type="file" id="restore-input" accept=".json" style="display:none" onchange="restoreData(this)">

    <button class="export-btn" id="show-all-btn" onclick="toggleShowAll()">Show all tasks</button>

    <button class="export-btn" onclick="exportNowTasks()">Export “now” tasks</button>
    <button class="export-btn" onclick="forceReset()" style="color:#c0392b;border-color:#c0392b" title="Reload all default data">Reset data</button>
    <button class="export-btn" id="conclude-phase-btn" onclick="concludePhase()">Conclude phase →</button>
    <button class="export-btn" id="reopen-phase-btn" onclick="reopenPhase()" style="display:none">Re-open phase</button>
    <button class="export-btn" onclick="deletePhase()" style="color:#c0392b;border-color:#c0392b">Delete phase</button>
    <span class="export-toast" id="export-toast" style="opacity:0">Downloaded!</span>
  </div>
  <div class="phase-rail" id="phase-rail"></div>
  <div class="metrics" id="metrics"></div>
  <table>

  <div id="popover-wrap" style="position:fixed;inset:0;display:none;z-index:9" onclick="closePopover()"></div>
  <div id="popover" class="popover" style="display:none"></div>
</div>

function loadData(){
  try{
    const saved=localStorage.getItem(LS_KEY);
    if(saved){
      const parsed=JSON.parse(saved);
      const hasData=Object.keys(defaultData).some(k=>
        parsed[k]&&parsed[k].topics&&parsed[k].topics.length>0
      );
      if(hasData) return parsed;
    }
  }catch(e){}
  return resetToDefault();
}

function resetToDefault(){
  const fresh=JSON.parse(JSON.stringify(defaultData));
  try{localStorage.setItem(LS_KEY,JSON.stringify(fresh));}catch(e){}
  return fresh;
}

let phases=loadData();

function saveData(){
  try{localStorage.setItem(LS_KEY,JSON.stringify(phases));}catch(e){}
  const ind=document.getElementById('save-indicator');
  ind.textContent='Saving...';
  ind.style.opacity='1';
  sb.from('os_projects').upsert({id:DEVICE_ID,data:JSON.stringify(phases),updated_at:new Date().toISOString()})
    .then(({error})=>{
      if(error){ind.textContent='Saved locally';console.warn('Supabase save error:',error);}
      else ind.textContent='Synced';
      clearTimeout(ind._t);
      ind._t=setTimeout(()=>{ind.style.opacity='0';},1500);
    });
}

async function loadFromSupabase(){
  try{
    const {data,error}=await sb.from('os_projects').select('data').eq('id',DEVICE_ID).single();
    if(error||!data) return null;
    const parsed=JSON.parse(data.data);
    const hasData=Object.keys(defaultData).some(k=>parsed[k]&&parsed[k].topics&&parsed[k].topics.length>0);
    return hasData?parsed:null;
  }catch(e){return null;}
}

function allTasks(ph){return phases[ph].topics.flatMap(t=>t.subjects.flatMap(s=>s.tasks))}

// Returns phase keys sorted by numeric suffix (PH2 < PH3 < PH4 …)
function getSortedPhaseKeys(phasesData){
  return Object.keys(phasesData||phases).sort((a,b)=>{
    const na=parseInt(a.replace(/\D/g,''))||0;
    const nb=parseInt(b.replace(/\D/g,''))||0;
    return na-nb;
  });
}
window.getSortedPhaseKeys=getSortedPhaseKeys;

// Format "YYYY-MM" → "Jan 2025"
function fmtMonth(ym){
  if(!ym) return '';
  const parts=ym.split('-');
  if(parts.length<2) return ym;
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const m=parseInt(parts[1],10);
  return (months[m-1]||ym)+' '+parts[0];
}
window.fmtMonth=fmtMonth;

function renderTabs(){
  const rail=document.getElementById('phase-rail');
  if(!rail) return;
  rail.innerHTML='';

  getSortedPhaseKeys().forEach(k=>{
    const ph=phases[k];
    if(!ph) return;
    const isActive=k===currentPhase;

    const item=document.createElement('div');
    item.className='rail-item'+(isActive?' active':'');
    item.onclick=()=>setPhase(k);

    // Phase name + status
    const nameDiv=document.createElement('div');
    nameDiv.className='rail-name';
    nameDiv.textContent=ph.label+(ph.concluded?' ✓':'');
    item.appendChild(nameDiv);

    // Date range (month inputs, stop propagation so they don't switch phase)
    const datesDiv=document.createElement('div');
    datesDiv.className='rail-dates';
    datesDiv.onclick=(e)=>e.stopPropagation();

    const startInp=document.createElement('input');
    startInp.type='month';
    startInp.className='rail-date-inp';
    startInp.value=ph.startDate||'';
    startInp.title='Start';
    startInp.onchange=()=>{phases[k].startDate=startInp.value;saveData();};

    const sep=document.createElement('span');
    sep.className='rail-sep';
    sep.textContent='→';

    const endInp=document.createElement('input');
    endInp.type='month';
    endInp.className='rail-date-inp';
    endInp.value=ph.endDate||'';
    endInp.title='End';
    endInp.onchange=()=>{phases[k].endDate=endInp.value;saveData();};

    datesDiv.appendChild(startInp);
    datesDiv.appendChild(sep);
    datesDiv.appendChild(endInp);
    item.appendChild(datesDiv);
    rail.appendChild(item);
  });

  const concluded=!!(phases[currentPhase]&&phases[currentPhase].concluded);
  const reopenBtn=document.getElementById('reopen-phase-btn');
  const concludeBtn=document.getElementById('conclude-phase-btn');
  if(reopenBtn) reopenBtn.style.display=concluded?'':'none';
  if(concludeBtn) concludeBtn.style.display=concluded?'none':'';
}

function renderMetrics(){
  const all=allTasks(currentPhase).length,done=allTasks(currentPhase).filter(t=>t.done).length;
  const pct=all?Math.round(done/all*100):0;
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="ml">Topics</div><div class="mv">${phases[currentPhase].topics.length}</div></div>
    <div class="metric"><div class="ml">Total tasks</div><div class="mv">${all}</div></div>
    <div class="metric"><div class="ml">Done</div><div class="mv">${done}</div></div>
    <div class="metric"><div class="ml">Progress</div><div class="mv">${pct}%</div></div>
  `;
}

function renderTable(){
  const tbody=document.getElementById('tbody');
  tbody.innerHTML='';
  const ph=phases[currentPhase];
  const archivedCount=ph.topics.filter(t=>t.archived).length;
  const archBtn=document.getElementById('show-archived-btn');
  if(archBtn){
    if(archivedCount>0){archBtn.style.display='';archBtn.textContent=(showArchived?'Hide archived':'Show archived')+` (${archivedCount})`;}
    else{archBtn.style.display='none';showArchived=false;}
  }
  const visibleTopics=showArchived?ph.topics:ph.topics.filter(t=>!t.archived);
  visibleTopics.forEach((topic,ti)=>{
    topic.subjects.forEach((sub,si)=>{
      const isFirst=si===0;
      const isLast=si===topic.subjects.length-1;
      const tr=document.createElement('tr');
      tr.className='subj-row';
      if(isFirst){
        // inject column number row for this topic
        const numTr=document.createElement('tr');
        numTr.className='num-row';
        const numEmpty1=document.createElement('td');
        const numEmpty2=document.createElement('td');
        const numTd=document.createElement('td');
        numTd.style.cssText='padding:1px 0;border-left:1px solid #ccc';
        const maxSubTasks=showAllTasks?Math.max(0,...topic.subjects.map(s=>s.tasks.filter(tk=>!tk.done).length)):3;
        const chipW=window.innerWidth<=480?120:window.innerWidth<=768?140:200;
        let numHtml='<div style="display:flex;gap:0">';
        for(let n=1;n<=maxSubTasks;n++) numHtml+=`<div style="width:${chipW}px;flex-shrink:0;font-size:10px;color:#bbb;text-align:center;border-right:1px solid #ccc;padding:1px 0">${n}</div>`;
        numHtml+='</div>';
        numTd.innerHTML=numHtml;
        numTr.appendChild(numEmpty1);
        numTr.appendChild(numEmpty2);
        numTr.appendChild(numTd);
        tbody.appendChild(numTr);

        const topicTd=document.createElement('td');
        topicTd.className='topic-cell';
        topicTd.rowSpan=topic.subjects.length;
        const topicTotal=topic.subjects.flatMap(s=>s.tasks).length;
        const topicDone=topic.subjects.flatMap(s=>s.tasks).filter(t=>t.done).length;
        topicTd.innerHTML=`<div class="topic-label"><span class="drag-handle" title="Drag to reorder">&#8597;</span><div class="topic-dot" style="background:${topic.color}"></div><span class="topic-name">${topic.name}</span></div><div style="font-size:10px;color:#aaa;margin-top:2px;padding-left:14px">${topicDone}/${topicTotal}</div>`;
        topicTd.draggable=true;
        topicTd.dataset.tid=topic.id;
        topicTd.addEventListener('dragstart',(e)=>{
          e.dataTransfer.setData('tid',topic.id);
          topicTd.classList.add('dragging');
          e.dataTransfer.effectAllowed='move';
        });
        topicTd.addEventListener('dragend',()=>{
          topicTd.classList.remove('dragging');
          document.querySelectorAll('.drag-over-top,.drag-over-bottom').forEach(el=>el.classList.remove('drag-over-top','drag-over-bottom'));
        });
        topicTd.addEventListener('dragover',(e)=>{
          e.preventDefault();
          document.querySelectorAll('.drag-over-top,.drag-over-bottom').forEach(el=>el.classList.remove('drag-over-top','drag-over-bottom'));
          const rect=topicTd.getBoundingClientRect();
          const mid=rect.top+rect.height/2;
          if(e.clientY<mid) tr.classList.add('drag-over-top');
          else tr.classList.add('drag-over-bottom');
          e.dataTransfer.dropEffect='move';
        });
        topicTd.addEventListener('drop',(e)=>{
          e.preventDefault();
          const fromId=parseInt(e.dataTransfer.getData('tid'));
          const toId=topic.id;
          if(fromId===toId) return;
          const ph=phases[currentPhase];
          const fromIdx=ph.topics.findIndex(t=>t.id===fromId);
          const toIdx=ph.topics.findIndex(t=>t.id===toId);
          const rect=topicTd.getBoundingClientRect();
          const mid=rect.top+rect.height/2;
          const after=e.clientY>=mid;
          const [moved]=ph.topics.splice(fromIdx,1);
          const newIdx=ph.topics.findIndex(t=>t.id===toId);
          ph.topics.splice(after?newIdx+1:newIdx,0,moved);
          saveData();
          renderTable();
          renderColNumbers();
        });
        tr.appendChild(topicTd);
      }
      const subjTd=document.createElement('td');
      subjTd.className='subj-cell';
      const subDone=sub.tasks.filter(t=>t.done).length;
      const subTotal=sub.tasks.length;
      const countStr=subTotal>0?` <span style="font-size:10px;color:#aaa">${subDone}/${subTotal}</span>`:'';
      const concludedBadge=sub.concluded?`<span class="subj-check-badge"></span>`:'';
      const concludedClass=sub.concluded?' class="subj-concluded"':'';
      subjTd.innerHTML=concludedBadge+`<span${concludedClass}>${sub.name}</span>`+countStr+(sub.goal?`<span class="goal-pill">${sub.goal}</span>`:'');
      tr.appendChild(subjTd);

      const tasksTd=document.createElement('td');
      tasksTd.className='tasks-cell';
      const wrap=document.createElement('div');
      wrap.className='tasks-inline';
      wrap.id=`row-${topic.id}-${sub.id}`;
      (showAllTasks?sub.tasks:sub.tasks.filter(t=>!t.done)).slice(0,showAllTasks?undefined:3).forEach(t=>{
        const chip=document.createElement('div');
        const pClass=(t.done&&showAllTasks)?' done':t.priority==='urgent'?' urgent':t.priority==='future'?' future':t.priority==='nextphase'?' nextphase':'';
        chip.className='task-chip'+pClass;
        chip.innerHTML=`<span class="task-drag-handle" title="Drag to reorder">⠿</span><div class="chip-check"></div><span class="chip-label">${t.text}</span>`;
        chip.onclick=(e)=>{if(e.target.closest('.task-drag-handle')) return; toggleTask(topic.id,sub.id,t.id);};
        chip.oncontextmenu=(e)=>{e.preventDefault();cyclePriority(topic.id,sub.id,t.id);};
        chip.title='Right-click to set priority';
        const realIdx=sub.tasks.findIndex(tk=>tk.id===t.id);
        chip.draggable=true;
        chip.addEventListener('dragstart',e=>{
          _dragTaskInfo={phaseKey:currentPhase,topicId:topic.id,subjectId:sub.id,taskIdx:realIdx};
          e.dataTransfer.effectAllowed='move';
          chip.classList.add('task-dragging');
        });
        chip.addEventListener('dragend',()=>{
          _dragTaskInfo=null;
          chip.classList.remove('task-dragging');
          document.querySelectorAll('.task-drop-before,.task-drop-after').forEach(el=>el.classList.remove('task-drop-before','task-drop-after'));
        });
        chip.addEventListener('dragover',e=>{
          if(!_dragTaskInfo||_dragTaskInfo.topicId!==topic.id||_dragTaskInfo.subjectId!==sub.id) return;
          e.preventDefault();
          e.dataTransfer.dropEffect='move';
          document.querySelectorAll('.task-drop-before,.task-drop-after').forEach(el=>el.classList.remove('task-drop-before','task-drop-after'));
          const rect=chip.getBoundingClientRect();
          if(e.clientX<rect.left+rect.width/2) chip.classList.add('task-drop-before');
          else chip.classList.add('task-drop-after');
        });
        chip.addEventListener('dragleave',()=>{chip.classList.remove('task-drop-before','task-drop-after');});
        chip.addEventListener('drop',e=>{
          e.preventDefault();
          chip.classList.remove('task-drop-before','task-drop-after');
          if(!_dragTaskInfo||_dragTaskInfo.topicId!==topic.id||_dragTaskInfo.subjectId!==sub.id) return;
          const fromIdx=_dragTaskInfo.taskIdx;
          if(fromIdx===realIdx) return;
          const rect=chip.getBoundingClientRect();
          const after=e.clientX>=rect.left+rect.width/2;
          phases=moveTask(phases,currentPhase,topic.id,sub.id,fromIdx,realIdx,after);
          saveData();renderTable();renderColNumbers();
        });
        wrap.appendChild(chip);
      });
      const addBtn=document.createElement('div');
      addBtn.className='add-chip';
      addBtn.textContent='+ add';
      addBtn.onclick=(e)=>{e.stopPropagation();showPopover(e,topic.id,sub.id);};
      wrap.appendChild(addBtn);
      tasksTd.appendChild(wrap);
      tr.appendChild(tasksTd);
      tbody.appendChild(tr);

      if(isLast&&ti<visibleTopics.length-1){
        const sep=document.createElement('tr');
        sep.className='sep-row';
        sep.innerHTML='<td colspan="3"></td>';
        tbody.appendChild(sep);
      }
    });
  });
  requestAnimationFrame(applyOverflow);
  renderMetrics();
}

function applyOverflow(){
  if(showAllTasks) return;
  const ph=phases[currentPhase];
  ph.topics.forEach(topic=>{
    topic.subjects.forEach(sub=>{
      const wrap=document.getElementById(`row-${topic.id}-${sub.id}`);
      if(!wrap) return;
      const chips=Array.from(wrap.querySelectorAll('.task-chip'));
      const addBtn=wrap.querySelector('.add-chip');
      const existing=wrap.querySelector('.overflow-badge');
      if(existing) existing.remove();
      chips.forEach(c=>c.style.display='');
      const containerW=wrap.parentElement.clientWidth-16;
      const BADGE_W=56;
      let usedW=addBtn?addBtn.offsetWidth+5:0;
      let firstHiddenIdx=-1;
      for(let i=0;i<chips.length;i++){
        const cw=chips[i].offsetWidth+5;
        if(usedW+cw+(i<chips.length-1?BADGE_W:0)>containerW){firstHiddenIdx=i;break;}
        usedW+=cw;
      }
      if(firstHiddenIdx>=0){
        const hidden=chips.length-firstHiddenIdx;
        for(let i=firstHiddenIdx;i<chips.length;i++) chips[i].style.display='none';
        const badge=document.createElement('div');
        badge.className='overflow-badge';
        badge.textContent=`+${hidden} more`;
        badge.onclick=(e)=>{e.stopPropagation();showPopover(e,topic.id,sub.id);};
        wrap.insertBefore(badge,addBtn);
      }
    });
  });
}

function showPopover(e,tid,sid){

    <div style="display:flex;align-items:center;gap:6px">
      <div style="width:8px;height:8px;border-radius:50%;background:${topic.color};flex-shrink:0"></div>

  subjSection.style.cssText='padding:4px 6px 2px;border-bottom:0.5px solid #eee;margin-bottom:4px';
  subjSection.innerHTML=`<div style="font-size:11px;color:#aaa;margin-bottom:4px">Subjects</div>`;
  topic.subjects.forEach(s=>{
    const sRow=document.createElement('div');
    sRow.style.cssText='display:flex;align-items:center;gap:6px;padding:3px 0';
    const isActive=s.id===sid;
    const concludeBtn=s.concluded
      ?`<button class="act-btn reopen" onclick="toggleConcludeSubject(${tid},${s.id})">Reopen</button>`
      :`<button class="act-btn conclude" onclick="toggleConcludeSubject(${tid},${s.id})">Conclude</button>`;

    sRow.innerHTML=`${s.concluded?'<span class="subj-check-badge"></span>':''}
      <span id="subj-name-${tid}-${s.id}" style="font-size:12px;flex:1;${nameStyle}">${s.name}</span>
      <button id="subj-edit-btn-${tid}-${s.id}" class="act-btn" onclick="startEditSubject(${tid},${s.id})">Edit</button>

    <button class="act-btn" onclick="addSubject(${tid})">Add</button>`;

  pop.appendChild(subjSection);

  // Tasks list
  sub.tasks.forEach(t=>{
    const row=document.createElement('div');
    row.className='popover-task';
    const pColor=t.priority==='urgent'?'#1a1a1a':t.priority==='future'?'#E8846A':t.priority==='nextphase'?'#7F77DD':'#1a1a1a';
    row.innerHTML=`<div style="width:14px;height:14px;border-radius:50%;border:1.5px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center;${t.done?'background:#1D9E75;border-color:#1D9E75':''}"></div>

  pop.style.top=(rect.bottom+window.scrollY+4)+'px';
  pop.style.left=Math.min(rect.left,window.innerWidth-290)+'px';
  setTimeout(()=>{const i=document.getElementById('pop-inp');if(i)i.focus();},50);

function startEditTask(tid,sid,taskId,btn){
  const topic=phases[currentPhase].topics.find(x=>x.id===tid);
  const sub=topic&&topic.subjects.find(x=>x.id===sid);
  const t=sub&&sub.tasks.find(x=>x.id===taskId);
  if(!t) return;
  const row=btn.closest('.popover-task');
  const textSpan=row.querySelector('span');
  const oldText=t.text;
  const inp=document.createElement('input');
  inp.className='inline-edit';
  inp.value=oldText;
  textSpan.replaceWith(inp);
  btn.textContent='Save';
  btn.onclick=()=>{
    const val=inp.value.trim();
    if(val){t.text=val;saveData();renderTable();}
    btn.closest('.popover-task').querySelector('.inline-edit')?.replaceWith(Object.assign(document.createElement('span'),{textContent:t.text,style:'font-size:12px;flex:1;color:#1a1a1a'}));
    showPopover({target:btn},tid,sid);
  };
  inp.onkeydown=(ev)=>{if(ev.key==='Enter') btn.click();if(ev.key==='Escape') showPopover({target:btn},tid,sid);};
  inp.focus();
}

function deleteTask(tid,sid,taskId){
  const topic=phases[currentPhase].topics.find(x=>x.id===tid);
  const sub=topic&&topic.subjects.find(x=>x.id===sid);
  if(!sub) return;
  sub.tasks=sub.tasks.filter(x=>x.id!==taskId);
  saveData();renderTable();
  showPopover({target:document.body},tid,sid);
}

function startEditTopic(tid,sid){
  const topic=phases[currentPhase].topics.find(x=>x.id===tid);
  if(!topic) return;
  const disp=document.getElementById('topic-name-display');
  if(!disp) return;
  const inp=document.createElement('input');
  inp.className='inline-edit';
  inp.value=topic.name;
  disp.replaceWith(inp);
  inp.focus();
  inp.onkeydown=(ev)=>{
    if(ev.key==='Enter'){topic.name=inp.value.trim()||topic.name;saveData();renderTable();showPopover({target:inp},tid,sid);}
    if(ev.key==='Escape') showPopover({target:inp},tid,sid);
  };
}

function deleteTopic(tid){
  if(!confirm('Delete this topic and all its tasks?')) return;
  phases[currentPhase].topics=phases[currentPhase].topics.filter(x=>x.id!==tid);
  saveData();renderTable();closePopover();
}

/** Pure — sets topic.archived=true. */
function archiveTopic(phasesData,phaseKey,topicId){
  const data=JSON.parse(JSON.stringify(phasesData));
  const ph=data[phaseKey];if(!ph) return data;
  const topic=ph.topics.find(t=>t.id===topicId);if(!topic) return data;
  topic.archived=true;
  return data;
}
window.archiveTopic=archiveTopic;

/** Pure — removes topic.archived flag. */
function unarchiveTopic(phasesData,phaseKey,topicId){
  const data=JSON.parse(JSON.stringify(phasesData));
  const ph=data[phaseKey];if(!ph) return data;
  const topic=ph.topics.find(t=>t.id===topicId);if(!topic) return data;
  delete topic.archived;
  return data;
}
window.unarchiveTopic=unarchiveTopic;

function toggleArchiveTopic(tid){

  const dueStr=due.toISOString().slice(0,10).replace(/-/g,'');

    ics+='STATUS:NEEDS-ACTION'+CRLF;
    ics+='END:VTODO'+CRLF;
  });

function backupData(){
  const timestamp=new Date().toISOString().slice(0,16).replace('T','_').replace(/:/g,'-');
  const payload={version:1,timestamp,phases:JSON.parse(JSON.stringify(phases))};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`os-projects-backup-${timestamp}.json`;a.click();
  URL.revokeObjectURL(url);
  const toast=document.getElementById('export-toast');
  toast.textContent='Backup saved!';toast.style.opacity='1';
  clearTimeout(toast._t);toast._t=setTimeout(()=>{toast.style.opacity='0';toast.textContent='Downloaded!';},2000);

function restoreData(input){
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const payload=JSON.parse(e.target.result);
      if(!payload.phases) throw new Error('Invalid backup file');
      const hasData=Object.keys(payload.phases).some(k=>payload.phases[k]&&payload.phases[k].topics&&payload.phases[k].topics.length>0);
      if(!hasData) throw new Error('Backup appears empty');
      if(!confirm(`Restore backup from ${payload.timestamp||'unknown date'}? This will overwrite all current data.`)) return;
      phases=payload.phases;
      saveData();
      renderTabs();
      renderTable();
      renderColNumbers();
      const toast=document.getElementById('export-toast');
      toast.textContent='Restored!';toast.style.opacity='1';
      clearTimeout(toast._t);toast._t=setTimeout(()=>{toast.style.opacity='0';toast.textContent='Downloaded!';},2000);
    }catch(err){
      alert('Restore failed: '+err.message);
    }
    input.value='';
  };
  reader.readAsText(file);
}

function reopenPhase(){
  if(!phases[currentPhase].concluded) return;
  if(!confirm(`Re-open "${phases[currentPhase].label}"? It will no longer be marked as concluded.`)) return;
  delete phases[currentPhase].concluded;
  saveData();

}

// ── Delete phase ─────────────────────────────────────────────────────────────

function deletePhase(){
  const keys=Object.keys(phases);
  if(keys.length<=1){alert('Cannot delete the only remaining phase.');return;}
  const ph=phases[currentPhase];
  if(!confirm(`Delete "${ph.label}" and all its topics and tasks? This cannot be undone.`)) return;
  const idx=keys.indexOf(currentPhase);
  delete phases[currentPhase];
  // switch to adjacent phase: prefer previous, fall back to next
  const remaining=Object.keys(phases);
  currentPhase=remaining[Math.min(idx,remaining.length-1)];
  saveData();
  renderTabs();
  renderTable();
  renderColNumbers();
}

// ── Task reorder ─────────────────────────────────────────────────────────────

/** Pure — moves a task within a subject's task array. Returns new phasesData. */
function moveTask(phasesData,phaseKey,topicId,subjectId,fromIdx,toIdx,after){
  const data=JSON.parse(JSON.stringify(phasesData));
  const ph=data[phaseKey];
  if(!ph) return data;
  const topic=ph.topics.find(t=>t.id===topicId);
  if(!topic) return data;
  const sub=topic.subjects.find(s=>s.id===subjectId);
  if(!sub) return data;
  const tasks=sub.tasks;
  if(fromIdx<0||fromIdx>=tasks.length||toIdx<0||toIdx>=tasks.length||fromIdx===toIdx) return data;
  const [moved]=tasks.splice(fromIdx,1);
  const adj=fromIdx<toIdx?toIdx-1:toIdx;
  tasks.splice(after?adj+1:adj,0,moved);
  return data;
}
window.moveTask=moveTask;

// ── Phase transition ────────────────────────────────────────────────────────

/** Pure function — returns a deep-copy of phasesData with the transition applied.
 *  Exported as window.transitionTopics so the test suite can call it directly. */
function transitionTopics(phasesData, fromKey, toKey, selectedTopicIds){
  const data=JSON.parse(JSON.stringify(phasesData));
  const fromPhase=data[fromKey];
  const toPhase=data[toKey];
  if(!fromPhase||!toPhase) return {phases:data,error:'Invalid phase key'};

  selectedTopicIds.forEach(tid=>{
    const topic=fromPhase.topics.find(t=>t.id===tid);
    if(!topic) return;

    // find or create matching topic in destination
    let destTopic=toPhase.topics.find(t=>t.name.toLowerCase()===topic.name.toLowerCase());
    if(!destTopic){
      const allTopics=Object.values(data).flatMap(p=>p.topics);
      const maxTid=allTopics.reduce((a,t)=>Math.max(a,t.id),0);
      destTopic={id:maxTid+1,name:topic.name,color:topic.color,subjects:[]};
      toPhase.topics.push(destTopic);
    }

    topic.subjects.forEach(sub=>{
      // find or create matching subject in destination topic
      let destSub=destTopic.subjects.find(s=>s.name.toLowerCase()===sub.name.toLowerCase());
      if(!destSub){
        const allSubs=Object.values(data).flatMap(p=>p.topics.flatMap(t=>t.subjects));
        const maxSid=allSubs.reduce((a,s)=>Math.max(a,s.id),0);
        destSub={id:maxSid+1,name:sub.name,goal:sub.goal||'',tasks:[]};
        destTopic.subjects.push(destSub);
      }

      // append only unresolved tasks; deduplicate by text (case-insensitive)
      sub.tasks.filter(t=>!t.done).forEach(task=>{
        const exists=destSub.tasks.some(t=>t.text.toLowerCase()===task.text.toLowerCase());
        if(!exists){
          const maxId=destSub.tasks.reduce((a,t)=>Math.max(a,t.id),0);
          destSub.tasks.push({id:maxId+1,text:task.text,done:false,priority:task.priority});
        }
      });
    });
  });

  fromPhase.concluded=true;
  return {phases:data};
}
window.transitionTopics=transitionTopics;

function getNextPhaseKey(phasesData,phaseKey){
  const keys=Object.keys(phasesData);
  const idx=keys.indexOf(phaseKey);
  return (idx===-1||idx>=keys.length-1)?null:keys[idx+1];
}
window.getNextPhaseKey=getNextPhaseKey;

// ── Conclude wizard ──────────────────────────────────────────────────────────

/** Pure — returns initial wizard state. Exported for tests. */
function buildWizardState(fromKey, phasesData){
  const nums=Object.keys(phasesData).map(k=>parseInt(k.replace(/\D/g,''))||0).filter(n=>n>0);
  const nextNum=nums.length?Math.max(...nums)+1:2;
  const topics=(phasesData[fromKey]||{topics:[]}).topics;
  return {
    fromKey,
    step:1,
    newKey:`PH${nextNum}`,
    newLabel:`Phase ${nextNum}`,
    newStartDate:'',
    newEndDate:'',
    selectedTids:topics
      .filter(t=>t.subjects.flatMap(s=>s.tasks).some(tk=>!tk.done))
      .map(t=>t.id)
  };
}
window.buildWizardState=buildWizardState;

/** Pure — creates new phase and runs transition. Exported for tests. */
function applyWizard(state, phasesData){
  const data=JSON.parse(JSON.stringify(phasesData));
  data[state.newKey]={label:state.newLabel,startDate:state.newStartDate,endDate:state.newEndDate,topics:[]};
  const result=transitionTopics(data,state.fromKey,state.newKey,state.selectedTids);
  return result.error?{phases:data,error:result.error}:{phases:result.phases};
}
window.applyWizard=applyWizard;

let wizardState=null;
let _dragTaskInfo=null;

function concludePhase(){
  const fromKey=currentPhase;
  if(phases[fromKey].concluded){
    if(!confirm('This phase is already marked concluded. Re-run the transition?')) return;
  }
  wizardState=buildWizardState(fromKey,phases);
  renderWizard();
}

function renderWizard(){
  const existing=document.getElementById('conclude-wizard');
  if(existing) existing.remove();
  if(!wizardState) return;

  const overlay=document.createElement('div');
  overlay.id='conclude-wizard';
  overlay.style.cssText='position:fixed;inset:0;z-index:20;background:rgba(0,0,0,0.18);display:flex;align-items:center;justify-content:center';

  const box=document.createElement('div');
  box.style.cssText='background:#fff;border-radius:10px;padding:16px;max-width:440px;width:90%;border:0.5px solid #ccc;box-shadow:0 4px 16px rgba(0,0,0,.08);max-height:85vh;overflow-y:auto';

  // Step indicator
  const stepBar=document.createElement('div');
  stepBar.style.cssText='display:flex;gap:4px;margin-bottom:12px';
  ['New phase','Topics','Review'].forEach((lbl,i)=>{
    const s=document.createElement('span');
    const active=i+1===wizardState.step, past=i+1<wizardState.step;
    s.style.cssText=`font-size:10px;padding:2px 8px;border-radius:4px;border:0.5px solid ${active?'#1a1a1a':past?'#ccc':'#eee'};background:${active?'#1a1a1a':'transparent'};color:${active?'#fff':past?'#888':'#bbb'}`;
    s.textContent=lbl;
    stepBar.appendChild(s);
  });
  box.appendChild(stepBar);

  const content=document.createElement('div');
  if(wizardState.step===1) _wizStep1(content);
  else if(wizardState.step===2) _wizStep2(content);
  else _wizStep3(content);
  box.appendChild(content);

  overlay.appendChild(box);
  document.body.appendChild(overlay);
}

  _wizFooter(c,true,null,true);
}

function _wizFooter(c,showBack,onNext,showConfirm){
  const f=document.createElement('div');
  f.style.cssText='display:flex;gap:6px;justify-content:flex-end;padding-top:8px;border-top:0.5px solid #eee';
  const cancelBtn=document.createElement('button');
  cancelBtn.className='export-btn';cancelBtn.textContent='Cancel';cancelBtn.onclick=closeWizard;
  f.appendChild(cancelBtn);
  if(showBack){
    const b=document.createElement('button');
    b.className='export-btn';b.textContent='← Back';
    b.onclick=()=>{wizardState.step--;renderWizard();};
    f.appendChild(b);
  }
  if(onNext){
    const n=document.createElement('button');
    n.className='export-btn';n.textContent='Next →';n.onclick=onNext;
    f.appendChild(n);
  }
  if(showConfirm){
    const btn=document.createElement('button');
    btn.className='export-btn';btn.textContent='Conclude & Create →';btn.onclick=executeWizard;
    f.appendChild(btn);
  }
  c.appendChild(f);
}

function _wizAdvance(){
  if(!wizardState.newLabel.trim()){
    const inp=document.getElementById('wiz-name');
    if(inp) inp.focus();
    return;
  }
  wizardState.step++;
  renderWizard();
}

function closeWizard(){
  const el=document.getElementById('conclude-wizard');
  if(el) el.remove();
  wizardState=null;
}

function executeWizard(){
  if(!wizardState) return;
  const result=applyWizard(wizardState,phases);
  if(result.error){alert('Error: '+result.error);return;}
  const newKey=wizardState.newKey;
  phases=result.phases;
  closeWizard();
  currentPhase=newKey;
  saveData();
  renderTabs();
  renderTable();
  renderColNumbers();
}

window.addEventListener('resize',()=>requestAnimationFrame(applyOverflow));

(async()=>{
  const ind=document.getElementById('save-indicator');
  ind.textContent='Loading...';
  ind.style.opacity='1';
  const remote=await loadFromSupabase();
  if(remote){
    phases=remote;
    try{localStorage.setItem(LS_KEY,JSON.stringify(phases));}catch(e){}
    ind.textContent='Synced';
  } else {
    ind.textContent='Local';
  }
  clearTimeout(ind._t);
  ind._t=setTimeout(()=>{ind.style.opacity='0';},1500);
  renderTabs();
  renderTable();
  renderColNumbers();
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
function importXlsx(input){
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const phaseMap={'Projects PH2':'PH2','Projects PH3':'PH3','Projects PH4':'PH4'};
      let imported=0;

      wb.SheetNames.forEach(sheetName=>{
        const phKey=phaseMap[sheetName];
        if(!phKey) return;
        const rows=XLSX.utils.sheet_to_json(wb.Sheets[sheetName],{header:1,defval:''});
        if(!rows||rows.length<2) return;

        const parsed=parseSheet(rows);
        if(!phases[phKey]) phases[phKey]={label:sheetName,topics:[]};
        mergePhase(phases[phKey],parsed);
        imported++;
      });

      if(imported===0){alert('No matching sheets found. Make sure your sheets are named: Projects PH2, Projects PH3, Projects PH4');return;}
      saveData();
      renderTabs();
      renderTable();
      const toast=document.getElementById('export-toast');
      toast.textContent='Imported!';
      toast.style.opacity='1';
      clearTimeout(toast._t);
      toast._t=setTimeout(()=>{toast.style.opacity='0';toast.textContent='Downloaded!';},2500);
    }catch(err){
      alert('Import error: '+err.message);
      console.error(err);
    }
    input.value='';
  };
  reader.readAsArrayBuffer(file);
}

function parseSheet(rows){
  const topics=[];
  let currentTopic=null;
  let topicId=1000;
  let subjectId=1000;

  for(let i=1;i<Math.min(rows.length,74);i++){
    const row=rows[i];
    const col0=String(row[0]||'').trim();
    const col1=String(row[1]||'').trim();

    if(!col0&&!col1) continue;

    if(col0&&col0!=='->'&&!col0.startsWith('->')){
      currentTopic={id:topicId++,name:col0,color:COLORS[topics.length%COLORS.length],subjects:[]};
      topics.push(currentTopic);
    }

    if(col1&&currentTopic){
      const tasks=[];
      for(let c=2;c<row.length;c++){
        const raw=row[c];
        if(raw===undefined||raw===null) continue;
        const cell=String(raw).trim();
        if(!cell||cell==='undefined') continue;
        const text=cell.startsWith('-')?cell.replace(/^-\s*/,'').trim():cell;
        if(text) tasks.push(text);
      }
      currentTopic.subjects.push({id:subjectId++,name:col1,goal:'',tasks});
    }
  }
  return topics;
}

function mergePhase(phase, newTopics){
  newTopics.forEach(newTopic=>{
    const existing=phase.topics.find(t=>t.name.toLowerCase()===newTopic.name.toLowerCase());
    if(!existing){
      phase.topics.push({
        id:newTopic.id,name:newTopic.name,color:newTopic.color,
        subjects:newTopic.subjects.map(sub=>({
          id:sub.id,name:sub.name,goal:sub.goal,
          tasks:sub.tasks.map((t,i)=>({id:i+1,text:t,done:false,priority:undefined}))
        }))
      });
    } else {
      newTopic.subjects.forEach(newSub=>{
        const exSub=existing.subjects.find(s=>s.name.toLowerCase()===newSub.name.toLowerCase());
        if(!exSub){
          existing.subjects.push({
            id:newSub.id,name:newSub.name,goal:newSub.goal,
            tasks:newSub.tasks.map((t,i)=>({id:i+1,text:t,done:false,priority:undefined}))
          });
        } else {
          exSub.tasks=exSub.tasks.filter(t=>t.text&&t.text!=='undefined');
          newSub.tasks.forEach(taskText=>{
            if(!taskText||taskText==='undefined') return;
            const exTask=exSub.tasks.find(t=>t.text.toLowerCase()===taskText.toLowerCase());
            if(!exTask){
              const maxId=exSub.tasks.reduce((a,t)=>Math.max(a,t.id),0);
              exSub.tasks.push({id:maxId+1,text:taskText,done:false,priority:undefined});
            }
          });
        }
      });
    }
  });
}

function syncFromGSheets(){
  const url='https://docs.google.com/spreadsheets/d/1UpnrOrUUnNAUhWhkDFJhNJFmfR2985p7XrIO7VqE72g/export?format=xlsx';
  const toast=document.getElementById('export-toast');
  toast.textContent='Syncing...';
  toast.style.opacity='1';

  fetch(url)
    .then(r=>{
      if(!r.ok) throw new Error('Could not fetch sheet. Make sure it is publicly shared.');
      return r.arrayBuffer();
    })
    .then(buf=>{
      const wb=XLSX.read(buf,{type:'array'});
      const phaseMap={'Projects PH2':'PH2','Projects PH3':'PH3','Projects PH4':'PH4'};
      let imported=0;
      wb.SheetNames.forEach(sheetName=>{
        const phKey=phaseMap[sheetName];
        if(!phKey) return;
        const rows=XLSX.utils.sheet_to_json(wb.Sheets[sheetName],{header:1,defval:''});
        if(!rows||rows.length<2) return;
        const parsed=parseSheet(rows);
        const label=phases[phKey]?phases[phKey].label:sheetName;
        phases[phKey]={label,topics:[]};
        mergePhase(phases[phKey],parsed);
        imported++;
      });
      if(imported===0) throw new Error('No matching sheets found (Projects PH2/3/4/5).');
      saveData();
      renderTabs();
      renderTable();
      toast.textContent='Synced!';
      clearTimeout(toast._t);
      toast._t=setTimeout(()=>{toast.style.opacity='0';toast.textContent='Downloaded!';},2500);
    })
    .catch(err=>{
      toast.style.opacity='0';
      alert('Sync failed: '+err.message);
      console.error(err);
    });
}
</script>
