<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OS Projects</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:#1a1a1a;padding:1.5rem}
.app{max-width:960px;margin:0 auto}
.topbar{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.topbar h1{font-size:16px;font-weight:500;flex:1}
.phase-tabs{display:flex;gap:5px}
.tab{font-size:12px;padding:4px 11px;border-radius:6px;border:0.5px solid #ccc;background:transparent;color:#666;cursor:pointer}
.tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.tab:hover:not(.active){background:#f5f5f5}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:1.25rem}
.metric{background:#f5f5f5;border-radius:6px;padding:0.65rem 0.9rem}
.metric .ml{font-size:11px;color:#888;margin-bottom:2px}
.metric .mv{font-size:18px;font-weight:500;color:#1a1a1a}
table{width:100%;border-collapse:collapse;table-layout:fixed}
.col-topic{width:120px}
.col-subject{width:160px}
.col-tasks{width:auto}
thead th{font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.04em;padding:4px 8px 6px;border-bottom:0.5px solid #ddd;text-align:left}
.topic-cell{padding:6px 8px 4px;font-size:13px;font-weight:500;color:#1a1a1a;vertical-align:top}
.topic-label{display:flex;align-items:flex-start;gap:6px}
.topic-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}
.topic-name{word-break:break-word;white-space:normal;line-height:1.35}
.subj-row td{padding:2px 0}
.subj-row:last-child td{padding-bottom:8px}
.subj-cell{padding:3px 8px;font-size:12px;color:#666;vertical-align:middle;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tasks-cell{padding:3px 8px;vertical-align:middle;overflow:hidden}
.tasks-inline{display:flex;align-items:center;gap:5px;flex-wrap:nowrap;overflow:hidden}
.task-chip{display:flex;align-items:center;gap:5px;padding:3px 8px 3px 5px;border-radius:6px;border:0.5px solid #e0e0e0;background:#fff;cursor:pointer;flex-shrink:0;transition:background .1s}
.task-chip:hover{background:#f5f5f5}
.task-chip.done{background:#f5f5f5;border-color:transparent}
.chip-check{width:13px;height:13px;border-radius:50%;border:1.5px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.task-chip.done .chip-check{background:#1D9E75;border-color:#1D9E75}
.task-chip.done .chip-check::after{content:'';display:block;width:3px;height:5px;border:1.5px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px)}
.chip-label{font-size:12px;color:#1a1a1a;white-space:nowrap}
.task-chip.done .chip-label{text-decoration:line-through;color:#999}
.task-chip.urgent .chip-label{color:#1a1a1a;font-weight:500}
.task-chip.urgent{border-color:#aaa}
.task-chip.future .chip-label{color:#E8846A}
.task-chip.future{border-color:#F5C4B3}
.overflow-badge{flex-shrink:0;font-size:11px;padding:3px 8px;border-radius:6px;background:#f5f5f5;color:#666;cursor:pointer;border:0.5px solid #e0e0e0;white-space:nowrap}
.overflow-badge:hover{background:#e8e8e8}
.goal-pill{font-size:10px;padding:2px 7px;border-radius:6px;background:#E6F1FB;color:#0C447C;white-space:nowrap;display:inline-block;margin-left:4px}
.add-chip{flex-shrink:0;display:flex;align-items:center;padding:3px 8px;border-radius:6px;border:0.5px dashed #ccc;font-size:11px;color:#999;cursor:pointer;white-space:nowrap}
.add-chip:hover{background:#f5f5f5;color:#1a1a1a}
.sep-row td{height:1px;background:#eee;padding:0}
.add-topic-row{display:flex;gap:8px;margin-top:10px;align-items:center}
.add-topic-row input{font-size:12px;padding:5px 9px;border-radius:6px;border:0.5px solid #ccc;background:#fff;color:#1a1a1a}
.add-topic-row input::placeholder{color:#aaa}
.add-topic-row button{font-size:12px;padding:5px 12px;border-radius:6px;border:0.5px solid #ccc;background:transparent;color:#1a1a1a;cursor:pointer}
.add-topic-row button:hover{background:#f5f5f5}
.popover{position:absolute;z-index:10;background:#fff;border:0.5px solid #ccc;border-radius:10px;padding:8px;display:flex;flex-direction:column;gap:4px;min-width:200px;max-width:280px;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.popover-task{display:flex;align-items:center;gap:7px;padding:4px 6px;border-radius:6px;cursor:pointer}
.popover-task:hover{background:#f5f5f5}
.popover-add{display:flex;gap:6px;margin-top:4px;padding-top:6px;border-top:0.5px solid #eee}
.popover-add input{flex:1;font-size:12px;padding:4px 7px;border-radius:6px;border:0.5px solid #ccc;background:#fff;color:#1a1a1a}
.popover-add input::placeholder{color:#aaa}
.popover-add button{font-size:11px;padding:4px 8px;border-radius:6px;border:0.5px solid #ccc;background:transparent;color:#1a1a1a;cursor:pointer}
.popover-add button:hover{background:#f5f5f5}
.save-indicator{font-size:11px;color:#aaa;margin-left:8px;transition:opacity .3s}
.export-btn{font-size:12px;padding:4px 12px;border-radius:6px;border:0.5px solid #ccc;background:transparent;color:#666;cursor:pointer;margin-left:4px}
.export-btn:hover{background:#f5f5f5;color:#1a1a1a}
.export-toast{font-size:11px;color:#1D9E75;margin-left:6px;transition:opacity .3s}
</style>
</head>
<body>
<div class="app">

    <h1>OS Projects</h1>
    <span class="save-indicator" id="save-indicator"></span>
    <button class="export-btn" onclick="syncFromGSheets()">Sync Google Sheet</button>
    <button class="export-btn" onclick="document.getElementById('xlsx-input').click()">Import Excel</button>

    <div class="phase-tabs" id="phase-tabs"></div>

  <div class="metrics" id="metrics"></div>

  <div id="popover-wrap" style="position:fixed;inset:0;display:none;z-index:9" onclick="closePopover()"></div>
  <div id="popover" class="popover" style="display:none"></div>
</div>

function loadData(){
  try{
    const saved=localStorage.getItem(LS_KEY);
    if(saved){
      const parsed=JSON.parse(saved);
      const hasData=Object.keys(defaultData).some(k=>
        parsed[k]&&parsed[k].topics&&parsed[k].topics.length>0
      );
      if(hasData) return parsed;
    }
  }catch(e){}
  return resetToDefault();
}

function resetToDefault(){
  const fresh=JSON.parse(JSON.stringify(defaultData));
  try{localStorage.setItem(LS_KEY,JSON.stringify(fresh));}catch(e){}
  return fresh;
}

let phases=loadData();

function saveData(){
  try{
    localStorage.setItem(LS_KEY,JSON.stringify(phases));
    const ind=document.getElementById('save-indicator');
    ind.textContent='Saved';
    ind.style.opacity='1';
    clearTimeout(ind._t);
    ind._t=setTimeout(()=>{ind.style.opacity='0';},1500);
  }catch(e){}
}

function allTasks(ph){return phases[ph].topics.flatMap(t=>t.subjects.flatMap(s=>s.tasks))}

function renderTabs(){
  document.getElementById('phase-tabs').innerHTML=Object.entries(phases).map(([k,v])=>
    `<button class="tab ${k===currentPhase?'active':''}" onclick="setPhase('${k}')">${v.label}</button>`
  ).join('');
}

function renderMetrics(){
  const all=allTasks(currentPhase).length,done=allTasks(currentPhase).filter(t=>t.done).length;
  const pct=all?Math.round(done/all*100):0;
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="ml">Topics</div><div class="mv">${phases[currentPhase].topics.length}</div></div>
    <div class="metric"><div class="ml">Total tasks</div><div class="mv">${all}</div></div>
    <div class="metric"><div class="ml">Done</div><div class="mv">${done}</div></div>
    <div class="metric"><div class="ml">Progress</div><div class="mv">${pct}%</div></div>
  `;
}

function renderTable(){
  const tbody=document.getElementById('tbody');
  tbody.innerHTML='';
  const ph=phases[currentPhase];
  ph.topics.forEach((topic,ti)=>{
    topic.subjects.forEach((sub,si)=>{
      const isFirst=si===0;
      const isLast=si===topic.subjects.length-1;
      const tr=document.createElement('tr');
      tr.className='subj-row';
      if(isFirst){
        const topicTd=document.createElement('td');
        topicTd.className='topic-cell';
        topicTd.rowSpan=topic.subjects.length;
        topicTd.innerHTML=`<div class="topic-label"><div class="topic-dot" style="background:${topic.color}"></div><span class="topic-name">${topic.name}</span></div>`;
        tr.appendChild(topicTd);
      }
      const subjTd=document.createElement('td');
      subjTd.className='subj-cell';
      subjTd.innerHTML=sub.name+(sub.goal?`<span class="goal-pill">${sub.goal}</span>`:'');
      tr.appendChild(subjTd);

      const tasksTd=document.createElement('td');
      tasksTd.className='tasks-cell';
      const wrap=document.createElement('div');
      wrap.className='tasks-inline';
      wrap.id=`row-${topic.id}-${sub.id}`;
      sub.tasks.forEach(t=>{
        const chip=document.createElement('div');
        const pClass=t.done?' done':t.priority==='urgent'?' urgent':t.priority==='future'?' future':'';
        chip.className='task-chip'+pClass;
        chip.innerHTML=`<div class="chip-check"></div><span class="chip-label">${t.text}</span>`;
        chip.onclick=()=>toggleTask(topic.id,sub.id,t.id);
        chip.oncontextmenu=(e)=>{e.preventDefault();cyclePriority(topic.id,sub.id,t.id);};
        chip.title='Right-click to set priority';
        wrap.appendChild(chip);
      });
      const addBtn=document.createElement('div');
      addBtn.className='add-chip';
      addBtn.textContent='+ add';
      addBtn.onclick=(e)=>{e.stopPropagation();showPopover(e,topic.id,sub.id);};
      wrap.appendChild(addBtn);
      tasksTd.appendChild(wrap);
      tr.appendChild(tasksTd);
      tbody.appendChild(tr);

      if(isLast&&ti<ph.topics.length-1){
        const sep=document.createElement('tr');
        sep.className='sep-row';
        sep.innerHTML='<td colspan="3"></td>';
        tbody.appendChild(sep);
      }
    });
  });
  requestAnimationFrame(applyOverflow);
  renderMetrics();
}

function applyOverflow(){
  const ph=phases[currentPhase];
  ph.topics.forEach(topic=>{
    topic.subjects.forEach(sub=>{
      const wrap=document.getElementById(`row-${topic.id}-${sub.id}`);
      if(!wrap) return;
      const chips=Array.from(wrap.querySelectorAll('.task-chip'));
      const addBtn=wrap.querySelector('.add-chip');
      const existing=wrap.querySelector('.overflow-badge');
      if(existing) existing.remove();
      chips.forEach(c=>c.style.display='');
      const containerW=wrap.parentElement.clientWidth-16;
      const BADGE_W=56;
      let usedW=addBtn?addBtn.offsetWidth+5:0;
      let firstHiddenIdx=-1;
      for(let i=0;i<chips.length;i++){
        const cw=chips[i].offsetWidth+5;
        if(usedW+cw+(i<chips.length-1?BADGE_W:0)>containerW){firstHiddenIdx=i;break;}
        usedW+=cw;
      }
      if(firstHiddenIdx>=0){
        const hidden=chips.length-firstHiddenIdx;
        for(let i=firstHiddenIdx;i<chips.length;i++) chips[i].style.display='none';
        const badge=document.createElement('div');
        badge.className='overflow-badge';
        badge.textContent=`+${hidden} more`;
        badge.onclick=(e)=>{e.stopPropagation();showPopover(e,topic.id,sub.id);};
        wrap.insertBefore(badge,addBtn);
      }
    });
  });
}

function showPopover(e,tid,sid){
  const topic=phases[currentPhase].topics.find(x=>x.id===tid);
  const sub=topic&&topic.subjects.find(x=>x.id===sid);
  if(!sub) return;
  openPopover={tid,sid};
  const pop=document.getElementById('popover');
  pop.innerHTML='';
  sub.tasks.forEach(t=>{
    const row=document.createElement('div');
    row.className='popover-task';
    const pColor=t.priority==='urgent'?'#1a1a1a':t.priority==='future'?'#E8846A':'#1a1a1a';
    const pLabel=t.priority==='urgent'?' ●':t.priority==='future'?' ○':'';
    row.innerHTML=`<div style="width:14px;height:14px;border-radius:50%;border:1.5px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center;${t.done?'background:#1D9E75;border-color:#1D9E75':''}"></div>
      <span style="font-size:12px;flex:1;${t.done?'text-decoration:line-through;color:#999':('color:'+pColor)}">${t.text}</span>
      <span style="font-size:10px;color:${t.priority==='future'?'#E8846A':'#aaa'};cursor:pointer;flex-shrink:0" title="Right-click chip or click here to cycle priority">${t.priority==='urgent'?'now':t.priority==='future'?'later':''}</span>`;
    row.onclick=()=>{toggleTask(tid,sid,t.id);showPopover(e,tid,sid);};
    row.oncontextmenu=(ev)=>{ev.preventDefault();cyclePriority(tid,sid,t.id);showPopover(e,tid,sid);};
    pop.appendChild(row);
  });
  const addRow=document.createElement('div');
  addRow.className='popover-add';
  addRow.innerHTML=`<input id="pop-inp" placeholder="New task..." /><button onclick="commitPopoverTask(${tid},${sid})">Add</button>`;
  pop.appendChild(addRow);
  pop.style.display='flex';
  document.getElementById('popover-wrap').style.display='block';
  const rect=e.target.getBoundingClientRect();
  pop.style.top=(rect.bottom+window.scrollY+4)+'px';
  pop.style.left=Math.min(rect.left,window.innerWidth-290)+'px';
  setTimeout(()=>{const i=document.getElementById('pop-inp');if(i)i.focus();},50);
}

function commitPopoverTask(tid,sid){
  const inp=document.getElementById('pop-inp');
  if(!inp||!inp.value.trim()) return;
  const topic=phases[currentPhase].topics.find(x=>x.id===tid);
  const sub=topic&&topic.subjects.find(x=>x.id===sid);
  if(sub){const maxId=sub.tasks.reduce((a,t)=>Math.max(a,t.id),0);sub.tasks.push({id:maxId+1,text:inp.value.trim(),done:false});}
  saveData();
  inp.value='';
  renderTable();
  showPopover({target:document.body},tid,sid);
}

function closePopover(){
  document.getElementById('popover').style.display='none';
  document.getElementById('popover-wrap').style.display='none';
  openPopover=null;
}

function toggleTask(tid,sid,taskId){
  const t=phases[currentPhase].topics.find(x=>x.id===tid);
  const s=t&&t.subjects.find(x=>x.id===sid);
  const tk=s&&s.tasks.find(x=>x.id===taskId);
  if(tk) tk.done=!tk.done;
  saveData();
  renderTable();
}

function cyclePriority(tid,sid,taskId){
  const t=phases[currentPhase].topics.find(x=>x.id===tid);
  const s=t&&t.subjects.find(x=>x.id===sid);
  const tk=s&&s.tasks.find(x=>x.id===taskId);
  if(!tk) return;
  const order=[undefined,"urgent","future"];
  const idx=order.indexOf(tk.priority);
  tk.priority=order[(idx+1)%3];
  saveData();
  renderTable();
}

function addTopic(){
  const tInp=document.getElementById('new-topic-inp');
  const sInp=document.getElementById('new-subj-inp');
  const name=tInp.value.trim();
  if(!name) return;
  phases[currentPhase].topics.push({id:nextTid++,name,color:COLORS[colorIdx%COLORS.length],subjects:[{id:nextSid++,name:sInp.value.trim()||'General',goal:'',tasks:[]}]});
  colorIdx++;tInp.value='';sInp.value='';
  saveData();
  renderTable();
}

function exportNowTasks(){
  const allNow=[];
  Object.entries(phases).forEach(([phaseKey,ph])=>{
    ph.topics.forEach(topic=>{
      topic.subjects.forEach(sub=>{
        sub.tasks.filter(t=>t.priority==='urgent'&&!t.done).forEach(t=>{
          allNow.push({text:t.text,topic:topic.name,subject:sub.name,phase:ph.label});
        });
      });
    });
  });

  if(allNow.length===0){
    alert("No tasks marked as 'now' found across all phases.");
    return;
  }

  const now=new Date();
  const stamp=now.toISOString().replace(/[-:.]/g,'').slice(0,15)+'Z';
  const due=new Date(now);
  due.setDate(due.getDate()+14);
  const dueStr=due.toISOString().slice(0,10).replace(/-/g,'');

  const CRLF='\r\n';
  let ics='BEGIN:VCALENDAR'+CRLF+'VERSION:2.0'+CRLF+'PRODID:-//OS Projects//EN'+CRLF+'CALSCALE:GREGORIAN'+CRLF;
  allNow.forEach((t,i)=>{
    const uid='osprojekt-'+stamp+'-'+i+'@osprojects';
    ics+='BEGIN:VTODO'+CRLF;
    ics+='UID:'+uid+CRLF;
    ics+='DTSTAMP:'+stamp+CRLF;
    ics+='SUMMARY:'+t.text+CRLF;
    ics+='DESCRIPTION:'+t.phase+' > '+t.topic+' > '+t.subject+CRLF;
    ics+='DUE;VALUE=DATE:'+dueStr+CRLF;
    ics+='PRIORITY:1'+CRLF;
    ics+='STATUS:NEEDS-ACTION'+CRLF;
    ics+='END:VTODO'+CRLF;
  });
  ics+='END:VCALENDAR';

  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='os-projects-now-tasks.ics';
  a.click();
  URL.revokeObjectURL(url);

  const toast=document.getElementById('export-toast');
  toast.style.opacity='1';
  clearTimeout(toast._t);
  toast._t=setTimeout(()=>{toast.style.opacity='0';},2000);
}

function forceReset(){
  if(!confirm('This will reload all default topics and tasks. Continue?')) return;
  phases=resetToDefault();
  renderTabs();
  renderTable();
}

function setPhase(p){currentPhase=p;closePopover();renderTabs();renderTable();}

window.addEventListener('resize',()=>requestAnimationFrame(applyOverflow));
renderTabs();
renderTable();
</script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
function importXlsx(input){
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const phaseMap={'Projects PH2':'PH2','Projects PH3':'PH3','Projects PH4':'PH4'};
      let imported=0;

      wb.SheetNames.forEach(sheetName=>{
        const phKey=phaseMap[sheetName];
        if(!phKey) return;
        const rows=XLSX.utils.sheet_to_json(wb.Sheets[sheetName],{header:1,defval:''});
        if(!rows||rows.length<2) return;

        const parsed=parseSheet(rows);
        if(!phases[phKey]) phases[phKey]={label:sheetName,topics:[]};
        mergePhase(phases[phKey],parsed);
        imported++;
      });

      if(imported===0){alert('No matching sheets found. Make sure your sheets are named: Projects PH2, Projects PH3, Projects PH4');return;}
      saveData();
      renderTabs();
      renderTable();
      const toast=document.getElementById('export-toast');
      toast.textContent='Imported!';
      toast.style.opacity='1';
      clearTimeout(toast._t);
      toast._t=setTimeout(()=>{toast.style.opacity='0';toast.textContent='Downloaded!';},2500);
    }catch(err){
      alert('Import error: '+err.message);
      console.error(err);
    }
    input.value='';
  };
  reader.readAsArrayBuffer(file);
}

function parseSheet(rows){
  const topics=[];
  let currentTopic=null;
  let topicId=1000;
  let subjectId=1000;

  for(let i=1;i<rows.length;i++){
    const row=rows[i];
    const col0=String(row[0]||'').trim();
    const col1=String(row[1]||'').trim();
    const col2=String(row[2]||'').trim();

    if(!col0&&!col1&&!col2) continue;

    if(col0&&col0!=='->'&&!col0.startsWith('->')){
      currentTopic={id:topicId++,name:col0,color:COLORS[topics.length%COLORS.length],subjects:[]};
      topics.push(currentTopic);
    }

    if(col1&&currentTopic){
      const tasks=[];
      for(let c=2;c<row.length;c++){
        const cell=String(row[c]||'').trim();
        if(cell&&cell.startsWith('-')){
          tasks.push(cell.replace(/^-\s*/,'').trim());
        }
      }
      if(col2&&col2.startsWith('-')) tasks.push(col2.replace(/^-\s*/,'').trim());
      currentTopic.subjects.push({id:subjectId++,name:col1,goal:'',tasks});
    }
  }
  return topics;
}

function mergePhase(phase, newTopics){
  newTopics.forEach(newTopic=>{
    const existing=phase.topics.find(t=>t.name.toLowerCase()===newTopic.name.toLowerCase());
    if(!existing){
      phase.topics.push(newTopic);
    } else {
      newTopic.subjects.forEach(newSub=>{
        const exSub=existing.subjects.find(s=>s.name.toLowerCase()===newSub.name.toLowerCase());
        if(!exSub){
          existing.subjects.push({id:newSub.id,name:newSub.name,goal:newSub.goal,tasks:newSub.tasks.map((t,i)=>({id:i+1,text:t,done:false,priority:undefined}))});
        } else {
          newSub.tasks.forEach(taskText=>{
            const exTask=exSub.tasks.find(t=>t.text.toLowerCase()===taskText.toLowerCase());
            if(!exTask){
              const maxId=exSub.tasks.reduce((a,t)=>Math.max(a,t.id),0);
              exSub.tasks.push({id:maxId+1,text:taskText,done:false,priority:undefined});
            }
          });
        }
      });
    }
  });
}

function syncFromGSheets(){
  const url='https://docs.google.com/spreadsheets/d/1UpnrOrUUnNAUhWhkDFJhNJFmfR2985p7XrIO7VqE72g/export?format=xlsx';
  const toast=document.getElementById('export-toast');
  toast.textContent='Syncing...';
  toast.style.opacity='1';

  fetch(url)
    .then(r=>{
      if(!r.ok) throw new Error('Could not fetch sheet. Make sure it is publicly shared.');
      return r.arrayBuffer();
    })
    .then(buf=>{
      const wb=XLSX.read(buf,{type:'array'});
      const phaseMap={'Projects PH2':'PH2','Projects PH3':'PH3','Projects PH4':'PH4'};
      let imported=0;
      wb.SheetNames.forEach(sheetName=>{
        const phKey=phaseMap[sheetName];
        if(!phKey) return;
        const rows=XLSX.utils.sheet_to_json(wb.Sheets[sheetName],{header:1,defval:''});
        if(!rows||rows.length<2) return;
        const parsed=parseSheet(rows);
        if(!phases[phKey]) phases[phKey]={label:sheetName,topics:[]};
        mergePhase(phases[phKey],parsed);
        imported++;
      });
      if(imported===0) throw new Error('No matching sheets found (Projects PH2/3/4/5).');
      saveData();
      renderTabs();
      renderTable();
      toast.textContent='Synced!';
      clearTimeout(toast._t);
      toast._t=setTimeout(()=>{toast.style.opacity='0';toast.textContent='Downloaded!';},2500);
    })
    .catch(err=>{
      toast.style.opacity='0';
      alert('Sync failed: '+err.message);
      console.error(err);
    });
}
</script>
